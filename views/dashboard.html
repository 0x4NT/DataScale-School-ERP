<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard</title>

<!-- Google Font -->
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">

<link rel="stylesheet" href="dashboard.css">
</head>
<body>

<!-- Top Pink Banner -->
<div class="top-banner">
    Portal
</div>

<div class="container">

    <!-- Sidebar -->
    <aside class="sidebar">
        <div class="logo">
            <span class="logo-icon"></span>
            <h2>Antontech</h2>
        </div>

        <nav>
            <ul>
                <li class="active">Dashboard</li>
                <li>Student Academics</li>
                <li>Human Resource</li>
                <li>Work Flow Management</li>
            </ul>
        </nav>
    </aside>

    <!-- Main Content -->
    <main class="main-content">

        <!-- Top Bar -->
        <div class="topbar">
            <h3>Kenya Christian Industrial Training Institute</h3>
            <div class="profile">
                <div class="icon-circle"></div>
                <div class="avatar"></div>
            </div>
        </div>

        <!-- Dashboard Cards -->
        <div class="dashboard-cards">

            <div class="card">
                <h4>Staff Population</h4>
                <div class="big-number">52</div>
                <div class="small-stats">
                    <span class="female">Female: 23</span>
                    <span class="others">Others: 0</span>
                </div>
            </div>

            <div class="card">
                <h4>Staff Population per Departments</h4>
                <div class="chart-placeholder">
                    Bar Chart Area
                </div>
            </div>

            <div class="card">
                <h4>Staff Population per Category</h4>
                <div class="chart-placeholder">
                    Pie Chart Area
                </div>
            </div>

        </div>

    </main>

</div>

</body>
</html>
