<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard</title>

<!-- Google Font -->
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<link rel="stylesheet" href="dashboard.css">
</head>
<body>

<!-- Top Pink Banner -->
<div class="top-banner">
    Portal
</div>

<div class="container">

    <!-- Sidebar -->
    <aside class="sidebar">
        <div class="logo">
            <span class="logo-icon">🅰</span>
            <h2>Antontech</h2>
        </div>

        <nav>
            <ul class="sidebar-menu">
                <li class="active" data-category="Dashboard">
                    <a href="#"><span class="icon"><i class="fa-solid fa-gauge"></i></span><span class="title">Dashboard</span></a>
                </li>
                <li data-category="Student Academics">
                    <a href="#"><span class="icon"><i class="fa-solid fa-graduation-cap"></i></span><span class="title">Student Academics</span></a>
                </li>
                <li data-category="Personel Management">
                    <a href="#"><span class="icon"><i class="fa-solid fa-user-tie"></i></span><span class="title">Personel Management</span></a>
                </li>
                <li data-category="Forum">
                    <a href="#"><span class="icon"><i class="fa-solid fa-users"></i></i></span><span class="title">Forum</span></a>
                </li>
                <li data-category="Setting">
                    <a href="#"><span class="icon"><i class="fa-solid fa-gear"></i></span><span class="title">Setting</span></a>
                </li>
                <li data-category="Logout">
                    <a href="#"><span class="icon"><i class="fa-solid fa-power-off"></i></span><span class="title">Logout</span></a>
                </li>
            </ul>
        </nav>
    </aside>

    <!-- Submenu -->
    <aside class="submenu">
        <ul class="submenu-list">
            <!-- JS populates this -->
        </ul>
    </aside>

    <!-- Main Content -->
    <main class="main-content">
        <!-- JS will inject dynamic content here -->
    </main>

</div>

<script src="dashboard.js"></script>
</body>
</html>
