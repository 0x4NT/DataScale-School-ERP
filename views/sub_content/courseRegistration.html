<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Course Registration</title>
<style>
/* ------------------ Scoped Container ------------------ */
.crp-container-5f3a1 {
    font-family: Arial, sans-serif;
    background-color: #f4f7f8;
    padding: 0;               /* remove padding for full-width */
    margin: 0;
    width: 100%;
    height: 100%;             /* take full parent height */
    box-sizing: border-box;
}

.crp-box-9a2b7 {
    width: 100%;              /* full width */
    height: 100%;             /* full height */
    margin: 0;                /* remove auto margins */
    background-color: #ffffff;
    padding: 20px;            /* optional inner padding */
    border-radius: 0;         /* remove rounded corners if needed */
    box-shadow: none;         /* remove shadow if embedding */
    box-sizing: border-box;
    display: flex;
    flex-direction: column;
    overflow-y: auto;         /* scroll if content overflows */
}

.crp-box-9a2b7 h1 {
    text-align: center;
    color: #333333;
    margin-top: 0;
}

.crp-box-9a2b7 p {
    text-align: center;
    color: #666666;
    font-size: 0.95rem;
    margin-top: 5px;
}

/* ------------------ Form Styles ------------------ */
.crp-form-b4c8e {
    display: flex;
    flex-direction: column;
    flex: 1;                  /* take all remaining space */
    width: 100%;
    height: 100%;
}

.crp-form-b4c8e label {
    margin-top: 15px;
    font-weight: bold;
    color: #555555;
}

.crp-form-b4c8e input[type="text"],
.crp-form-b4c8e input[type="email"],
.crp-form-b4c8e input[type="number"],
.crp-form-b4c8e select,
.crp-form-b4c8e textarea {
    padding: 10px;
    margin-top: 5px;
    border: 1px solid #ccc;
    border-radius: 5px;
    font-size: 1rem;
    width: 100%;
    box-sizing: border-box;
}

.crp-form-b4c8e textarea {
    resize: vertical;
}

/* ------------------ Radio / Checkbox ------------------ */
.crp-inline-6d2f1 {
    display: flex;
    gap: 20px;
    margin-top: 5px;
}

/* ------------------ Buttons ------------------ */
.crp-form-b4c8e button {
    margin-top: 25px;
    padding: 12px;
    font-size: 1rem;
    background-color: #007BFF;
    color: #fff;
    border: none;
    border-radius: 6px;
    cursor: pointer;
    transition: background-color 0.3s ease;
}

.crp-form-b4c8e button:hover {
    background-color: #0056b3;
}

/* ------------------ Fieldset Styling ------------------ */
.crp-fieldset-2f9b4 {
    border: 1px solid #ccc;
    border-radius: 8px;
    padding: 20px;
    margin-top: 20px;
}

.crp-fieldset-2f9b4 legend {
    font-weight: bold;
    padding: 0 10px;
}

/* ------------------ Responsive ------------------ */
@media (max-width: 600px) {
    .crp-inline-6d2f1 {
        flex-direction: column;
    }
}
</style>
</head>
<body>
<div class="crp-container-5f3a1">
    <div class="crp-box-9a2b7">
        <h1>Course Registration</h1>
        <p>Please fill out the form below to register for your courses</p>

        <form id="crp-form" class="crp-form-b4c8e">

            <!-- Student Information -->
            <fieldset class="crp-fieldset-2f9b4">
                <legend>Student Information</legend>

                <label for="crp-studentName">Full Name:</label>
                <input type="text" id="crp-studentName" name="studentName" placeholder="Enter your full name" required>

                <label for="crp-studentID">Student ID:</label>
                <input type="text" id="crp-studentID" name="studentID" placeholder="Enter your student ID" required>

                <label for="crp-email">Email:</label>
                <input type="email" id="crp-email" name="email" placeholder="Enter your email address" required>

                <label>Gender:</label>
                <div class="crp-inline-6d2f1">
                    <label><input type="radio" name="gender" value="Male" required> Male</label>
                    <label><input type="radio" name="gender" value="Female"> Female</label>
                    <label><input type="radio" name="gender" value="Other"> Other</label>
                </div>
            </fieldset>

            <!-- Course Selection -->
            <fieldset class="crp-fieldset-2f9b4">
                <legend>Course Selection</legend>

                <label for="crp-semester">Semester:</label>
                <select id="crp-semester" name="semester" required>
                    <option value="" disabled selected>Select semester</option>
                    <option value="1">Semester 1</option>
                    <option value="2">Semester 2</option>
                    <option value="3">Semester 3</option>
                    <option value="4">Semester 4</option>
                </select>

                <label for="crp-courses">Select Courses:</label>
                <select id="crp-courses" name="courses[]" multiple size="5" required>
                    <option value="mathematics">Mathematics</option>
                    <option value="physics">Physics</option>
                    <option value="chemistry">Chemistry</option>
                    <option value="biology">Biology</option>
                    <option value="computerScience">Computer Science</option>
                    <option value="english">English</option>
                    <option value="history">History</option>
                </select>

                <label>Course Type:</label>
                <div class="crp-inline-6d2f1">
                    <label><input type="checkbox" name="courseType" value="Core"> Core</label>
                    <label><input type="checkbox" name="courseType" value="Elective"> Elective</label>
                </div>
            </fieldset>

            <!-- Additional Notes -->
            <fieldset class="crp-fieldset-2f9b4">
                <legend>Additional Notes</legend>
                <label for="crp-notes">Notes / Special Requests:</label>
                <textarea id="crp-notes" name="notes" rows="4" placeholder="Enter any notes here..."></textarea>
            </fieldset>

            <button type="submit">Submit Registration</button>
        </form>
    </div>
</div>

<script>
const form = document.getElementById('crp-form');
form.addEventListener('submit', (e) => {
    e.preventDefault();

    const data = new FormData(form);
    const obj = {};
    data.forEach((value, key) => {
        if(obj[key]){
            if(Array.isArray(obj[key])) obj[key].push(value);
            else obj[key] = [obj[key], value];
        } else obj[key] = value;
    });

    console.log("Form Submission:", obj);
    alert("Registration submitted successfully!");
    form.reset();
});
</script>

</body>
</html>
